name: autonomy-loop

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review, converted_to_draft]
  push:
    branches:
      - main
      - codex/**

jobs:
  autonomy:
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run quality gate
        id: quality_gate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          python -m roxauto quality-gate --output artifacts/quality-gate.json
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Build agent packet
        shell: pwsh
        run: |
          python -m roxauto agent-packet --quality-gate artifacts/quality-gate.json --output artifacts/agent-packet.json

      - name: Render handoff brief
        shell: pwsh
        run: |
          python -m roxauto handoff-brief --quality-gate artifacts/quality-gate.json --agent-packet artifacts/agent-packet.json --output artifacts/handoff-brief.md

      - name: Upload autonomy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-artifacts
          path: artifacts/

      - name: Publish PR handoff comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- roxauto-subscription-loop -->";
            const body = fs.readFileSync("artifacts/handoff-brief.md", "utf8");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Sync PR body handoff section
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const startMarker = "<!-- roxauto-pr-handoff:start -->";
            const endMarker = "<!-- roxauto-pr-handoff:end -->";
            const handoffBody = fs.readFileSync("artifacts/handoff-brief.md", "utf8").trim();
            const managedSection = `${startMarker}\n\n## Latest Codex Handoff\n\n${handoffBody}\n\n${endMarker}`;
            const currentBody = context.payload.pull_request.body || "";

            let nextBody = managedSection;
            const startIndex = currentBody.indexOf(startMarker);
            const endIndex = currentBody.indexOf(endMarker);

            if (startIndex !== -1 && endIndex !== -1 && endIndex > startIndex) {
              const before = currentBody.slice(0, startIndex).trimEnd();
              const after = currentBody.slice(endIndex + endMarker.length).trimStart();
              nextBody = [before, managedSection, after].filter(Boolean).join("\n\n");
            } else if (currentBody.trim()) {
              nextBody = `${currentBody.trim()}\n\n${managedSection}`;
            }

            if (nextBody !== currentBody) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: nextBody,
              });
            }

      - name: Fail when quality gate fails
        if: ${{ steps.quality_gate.outputs.exit_code != '0' }}
        shell: pwsh
        run: exit 1

  merge_pr:
    if: ${{ github.event_name == 'pull_request' }}
    needs: autonomy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge eligible Codex pull request
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const sameRepository = pullRequest.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const baseIsMain = pullRequest.base.ref === "main";
            const headIsCodexBranch = pullRequest.head.ref.startsWith("codex/");

            if (!sameRepository || !baseIsMain || !headIsCodexBranch || pullRequest.draft) {
              core.notice(
                `Skip merge for PR #${pullRequest.number}: ` +
                `sameRepository=${sameRepository}, base=${pullRequest.base.ref}, head=${pullRequest.head.ref}, draft=${pullRequest.draft}.`
              );
              return;
            }

            const response = await github.graphql(
              `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    squashMergeAllowed
                    rebaseMergeAllowed
                    mergeCommitAllowed
                    pullRequest(number: $number) {
                      number
                      merged
                      mergeable
                      mergeStateStatus
                    }
                  }
                }
              `,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: pullRequest.number,
              }
            );

            const repository = response.repository;
            const livePullRequest = repository.pullRequest;
            if (livePullRequest.merged) {
              core.notice(`PR #${pullRequest.number} is already merged.`);
              return;
            }

            const mergeMethod =
              (repository.squashMergeAllowed && "squash") ||
              (repository.rebaseMergeAllowed && "rebase") ||
              (repository.mergeCommitAllowed && "merge") ||
              null;

            if (!mergeMethod) {
              core.setFailed(`PR #${pullRequest.number} cannot be auto-merged because the repository allows no merge method.`);
              return;
            }

            if (livePullRequest.mergeable !== "MERGEABLE") {
              core.setFailed(
                `PR #${pullRequest.number} is not mergeable after the autonomy gate. mergeable=${livePullRequest.mergeable}, ` +
                `mergeStateStatus=${livePullRequest.mergeStateStatus}.`
              );
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
                merge_method: mergeMethod,
              });
              core.notice(`Merged PR #${pullRequest.number} with ${mergeMethod}.`);
            } catch (error) {
              core.setFailed(`GitHub rejected auto-merge for PR #${pullRequest.number}: ${error.message}`);
            }
