name: autonomy-loop

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - codex/**

jobs:
  autonomy:
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run quality gate
        id: quality_gate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          python -m roxauto quality-gate --output artifacts/quality-gate.json
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Build agent packet
        shell: pwsh
        run: |
          python -m roxauto agent-packet --quality-gate artifacts/quality-gate.json --output artifacts/agent-packet.json

      - name: Render handoff brief
        shell: pwsh
        run: |
          python -m roxauto handoff-brief --quality-gate artifacts/quality-gate.json --agent-packet artifacts/agent-packet.json --output artifacts/handoff-brief.md

      - name: Upload autonomy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-artifacts
          path: artifacts/

      - name: Publish PR handoff comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- roxauto-subscription-loop -->";
            const body = fs.readFileSync("artifacts/handoff-brief.md", "utf8");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail when quality gate fails
        if: ${{ steps.quality_gate.outputs.exit_code != '0' }}
        shell: pwsh
        run: exit 1
